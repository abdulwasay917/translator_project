<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Translator Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1f1c2c, #928dab);
    color:white;
}

/* Glass Card */
.card{
    width:900px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.2);
}

/* Title */
.title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

/* Textareas */
textarea{
    width:100%;
    height:180px;
    border-radius:15px;
    border:none;
    padding:15px;
    font-size:16px;
    outline:none;
    resize:none;
}

/* Language select */
select{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-top:10px;
    margin-bottom:10px;
    outline:none;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

/* Result */
.result{
    margin-top:20px;
    background: rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    min-height:100px;
    white-space:pre-wrap;
}

/* Loading */
.loading{
    display:none;
    text-align:center;
    margin-top:10px;
    color:#ccc;
}

/* Layout */
.row-flex{
    display:flex;
    gap:20px;
}

.col{
    flex:1;
}

</style>
</head>

<body>

<div class="card">

    <div class="title">🌍 Ultra Translator Pro</div>

    <div class="row-flex">

        <!-- INPUT -->
        <div class="col">
            <textarea id="text" placeholder="Enter text..."></textarea>
        </div>

        <!-- OUTPUT -->
        <div class="col">
            <div class="result" id="result">Translation will appear here...</div>
        </div>

    </div>

    <!-- LANGUAGE -->
    <select id="target">
        <option value="ur">Urdu 🇵🇰</option>
        <option value="en">English 🇬🇧</option>
        <option value="fr">French 🇫🇷</option>
        <option value="de">German 🇩🇪</option>
        <option value="es">Spanish 🇪🇸</option>
        <option value="ar">Arabic 🇸🇦</option>
        <option value="tr">Turkish 🇹🇷</option>
        <option value="hi">Hindi 🇮🇳</option>
    </select>

    <button onclick="translateText()">⚡ Translate Now</button>

    <div class="loading" id="loading">Translating...</div>

</div>

<script>

function translateText(){

    let text = document.getElementById("text").value;
    let target = document.getElementById("target").value;

    let result = document.getElementById("result");
    let loading = document.getElementById("loading");

    if(text.trim() === ""){
        alert("Enter text");
        return;
    }

    loading.style.display = "block";

    fetch("/translate/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCSRFToken()
        },
        body: new URLSearchParams({
            text: text,
            target: target
        })
    })
    .then(res => res.json())
    .then(data => {

        loading.style.display = "none";

        if(data.translated){
            result.innerHTML =
                "🌐 <b>Detected:</b> " + data.detected + "<br><br>" +
                "✨ <b>Result:</b><br>" + data.translated;
        }else{
            result.innerHTML = data.error;
        }

    });

}

function getCSRFToken(){
    let cookies = document.cookie.split(';');
    for(let c of cookies){
        c = c.trim();
        if(c.startsWith("csrftoken=")){
            return c.substring("csrftoken=".length);
        }
    }
    return "";
}

</script>

</body>
</html>
