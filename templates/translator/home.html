<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Translator Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card{
            border:none;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,0.15);
        }

        textarea{
            resize:none;
        }

        .btn-main{
            background:#4e54c8;
            color:white;
        }

        .btn-main:hover{
            background:#3b41c5;
            color:white;
        }

        .swap-btn{
            cursor:pointer;
            font-size:20px;
            margin-bottom:10px;
            display:inline-block;
        }

        .result-box{
            background:#f8f9fa;
            padding:15px;
            border-radius:12px;
            margin-top:15px;
            position:relative;
        }

        .copy-btn{
            position:absolute;
            top:10px;
            right:10px;
            border:none;
            background:#4e54c8;
            color:white;
            padding:5px 10px;
            border-radius:8px;
            font-size:12px;
        }

        .loading{
            display:none;
            text-align:center;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-7">

<div class="card p-4">

    <h3 class="text-center mb-3">🌍 Translator Pro</h3>

    <form method="POST" id="form">
        {% csrf_token %}

        <textarea name="text" id="text" class="form-control mb-2" rows="5" placeholder="Enter text...">{{ text }}</textarea>

        <div class="text-center">
            <span class="swap-btn" onclick="swapLang()">🔁 Swap</span>
        </div>

        <select name="direction" id="direction" class="form-select mb-3">
            <option value="en_ur">English → Urdu</option>
            <option value="ur_en">Urdu → English</option>
        </select>

        <button class="btn btn-main w-100" type="submit" onclick="showLoading()">
            Translate
        </button>

        <div class="loading" id="loading">
            ⏳ Translating...
        </div>
    </form>

    {% if translated %}
    <div class="result-box mt-3" id="resultBox">

        <button class="copy-btn" onclick="copyText()">Copy</button>

        <h6>Result:</h6>
        <p id="resultText">{{ translated }}</p>
    </div>
    {% endif %}

</div>

</div>
</div>
</div>

<script>

function swapLang(){
    let dir = document.getElementById("direction");

    if(dir.value === "en_ur"){
        dir.value = "ur_en";
    }else{
        dir.value = "en_ur";
    }
}

function showLoading(){
    document.getElementById("loading").style.display = "block";
}

function copyText(){
    let text = document.getElementById("resultText").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

</script>

</body>
</html>
