<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Translator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Arial;
        }

        .card{
            width:600px;
            border:none;
            border-radius:18px;
            box-shadow:0 15px 40px rgba(0,0,0,0.15);
        }

        textarea{
            resize:none;
        }

        .title{
            text-align:center;
            font-weight:bold;
        }

        .loading{
            display:none;
            text-align:center;
            margin-top:10px;
            color:#555;
        }

        .result{
            background:#f8f9fa;
            padding:15px;
            border-radius:12px;
            margin-top:15px;
            border-left:5px solid #4e54c8;
        }

        .badge-custom{
            background:#4e54c8;
        }
    </style>
</head>

<body>

<div class="card p-4">

    <h3 class="title mb-3">🌍 Smart Translator</h3>

    <!-- INPUT -->
    <textarea id="text" class="form-control mb-3" rows="5" placeholder="Enter text..."></textarea>

    <!-- LANGUAGE SELECT -->
    <select id="target" class="form-select mb-3">
        <option value="ur">Urdu 🇵🇰</option>
        <option value="en">English 🇬🇧</option>
        <option value="fr">French 🇫🇷</option>
        <option value="de">German 🇩🇪</option>
        <option value="es">Spanish 🇪🇸</option>
        <option value="it">Italian 🇮🇹</option>
        <option value="tr">Turkish 🇹🇷</option>
        <option value="ar">Arabic 🇸🇦</option>
    </select>

    <!-- BUTTON -->
    <button class="btn btn-primary w-100" onclick="translateText()">
        Translate ⚡
    </button>

    <!-- LOADING -->
    <div class="loading" id="loading">
        ⏳ Translating...
    </div>

    <!-- RESULT -->
    <div class="result mt-3" id="result" style="display:none;"></div>

</div>

<script>

function translateText(){

    let text = document.getElementById("text").value;
    let target = document.getElementById("target").value;

    let loading = document.getElementById("loading");
    let result = document.getElementById("result");

    if(text.trim() === ""){
        alert("Please enter text");
        return;
    }

    loading.style.display = "block";
    result.style.display = "none";

    fetch("/translate/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCSRFToken()
        },
        body: `text=${encodeURIComponent(text)}&target=${target}`
    })
    .then(res => res.json())
    .then(data => {

        loading.style.display = "none";

        if(data.translated){

            result.innerHTML =
                `<span class="badge badge-custom mb-2">Detected: ${data.detected}</span><br><br>` +
                `<b>Translation:</b><br>${data.translated}`;

        } else {
            result.innerText = data.error;
        }

        result.style.display = "block";
    });

}

// CSRF token
function getCSRFToken(){
    let cookies = document.cookie.split(';');

    for(let c of cookies){
        c = c.trim();
        if(c.startsWith("csrftoken=")){
            return c.substring("csrftoken=".length);
        }
    }
    return "";
}

</script>

</body>
</html>
