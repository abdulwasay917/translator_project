<!DOCTYPE html>
<html>
<head>
    <title>Translator AJAX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:500px;
            border:none;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        .loading{
            display:none;
            text-align:center;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="card p-4">

    <h4 class="text-center mb-3">🌍 AJAX Translator</h4>

    <textarea id="text" class="form-control mb-2" rows="4" placeholder="Enter text"></textarea>

    <select id="target" class="form-select mb-3">

    <option value="ur">Urdu 🇵🇰</option>
    <option value="en">English 🇬🇧</option>
    <option value="fr">French 🇫🇷</option>
    <option value="de">German 🇩🇪</option>
    <option value="es">Spanish 🇪🇸</option>
    <option value="it">Italian 🇮🇹</option>
    <option value="tr">Turkish 🇹🇷</option>
    <option value="ar">Arabic 🇸🇦</option>

</select>

    <button class="btn btn-primary w-100" onclick="translateText()">
        Translate
    </button>

    <div class="loading" id="loading">
        ⏳ Translating...
    </div>

    <div class="alert alert-success mt-3" id="result" style="display:none;"></div>

</div>

<script>

function translateText(){

    let text = document.getElementById("text").value;
    let direction = document.getElementById("direction").value;
    let loading = document.getElementById("loading");
    let result = document.getElementById("result");

    loading.style.display = "block";
    result.style.display = "none";

    fetch("/translate/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCSRFToken()
        },
        body: `text=${text}&direction=${direction}`
    })
    .then(res => res.json())
    .then(data => {
        loading.style.display = "none";

        if(data.translated){
            result.innerText = data.translated;
        }else{
            result.innerText = data.error;
        }

        result.style.display = "block";
    });

}

// CSRF token function
function getCSRFToken(){
    let cookieValue = null;
    let cookies = document.cookie.split(';');

    for(let i=0; i<cookies.length; i++){
        let cookie = cookies[i].trim();
        if(cookie.startsWith("csrftoken=")){
            cookieValue = cookie.substring("csrftoken=".length);
        }
    }
    return cookieValue;
}

</script>

</body>
</html>
