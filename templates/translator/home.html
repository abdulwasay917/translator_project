<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Translator</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .title {
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            resize: none;
        }

        .btn-custom {
            background: #4e54c8;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #3c40c6;
            color: white;
        }

        .result-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 5px solid #4e54c8;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card p-4">

                <h2 class="title">🌍 English ↔ Urdu Translator</h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <textarea name="text" class="form-control" rows="5" placeholder="Enter text...">{{ text }}</textarea>
                    </div>

                    <div class="mb-3">
                        <select name="direction" class="form-select">
                            <option value="en_ur">English → Urdu</option>
                            <option value="ur_en">Urdu → English</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-custom w-100">
                        Translate 🚀
                    </button>
                </form>

                {% if translated %}
                <div class="result-box">
                    <h6>Result:</h6>
                    <p class="mb-0">{{ translated }}</p>
                </div>
                {% endif %}

            </div>

        </div>
    </div>
</div>

</body>
</html>
